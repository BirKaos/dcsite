<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord Clone - Ali Rıza</title>
    <!-- Lucide İkon Kütüphanesi -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Agora RTC Web SDK (Sesli İletişim İçin) -->
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.20.0.js"></script>
    <style>
        /* Discord Renk Paleti ve Temel Ayarlar */
        :root {
            --bg-servers: #1e1f22;
            --bg-channels: #2b2d31;
            --bg-chat: #313338;
            --bg-members: #2b2d31;
            --bg-userpanel: #232428;
            --text-main: #dbdee1;
            --text-muted: #949ba4;
            --brand-color: #5865f2;
            --brand-hover: #4752c4;
            --input-bg: #383a40;
            --online-green: #23a55a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'GG Sans', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }

        body {
            background-color: var(--bg-chat);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* Sol Sunucu Listesi */
        .servers-sidebar {
            width: 72px;
            background-color: var(--bg-servers);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 12px;
            gap: 8px;
            flex-shrink: 0;
        }

        .server-icon {
            width: 48px;
            height: 48px;
            background-color: var(--bg-chat);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
            position: relative;
            font-weight: bold;
            color: var(--text-main);
        }

        .server-icon:hover, .server-icon.active {
            border-radius: 30%;
            background-color: var(--brand-color);
            color: white;
        }

        .server-icon::before {
            content: '';
            position: absolute;
            left: -12px;
            width: 8px;
            height: 0;
            background-color: white;
            border-radius: 0 4px 4px 0;
            transition: all 0.2s;
        }

        .server-icon:hover::before { height: 20px; }
        .server-icon.active::before { height: 40px; }

        .server-separator {
            width: 32px;
            height: 2px;
            background-color: #35363c;
            margin: 4px 0;
        }

        /* Kanal Listesi Bölümü */
        .channels-sidebar {
            width: 240px;
            background-color: var(--bg-channels);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .server-header {
            height: 48px;
            border-bottom: 1px solid #1f2023;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            font-weight: bold;
            font-size: 15px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }

        .channels-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px 8px;
        }

        .category-title {
            font-size: 12px;
            font-weight: bold;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin: 16px 0 4px 4px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .channel-item {
            display: flex;
            align-items: center;
            padding: 6px 8px;
            border-radius: 4px;
            cursor: pointer;
            margin-bottom: 2px;
            color: var(--text-muted);
            font-size: 15px;
            gap: 6px;
        }

        .channel-item:hover {
            background-color: #35373c;
            color: var(--text-main);
        }

        .channel-item.active {
            background-color: #404249;
            color: white;
        }

        /* Sesli Kanal Üye Listesi */
        .voice-users {
            margin-left: 24px;
            margin-bottom: 6px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .voice-user {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: var(--text-main);
            padding: 4px;
        }

        .voice-avatar {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background-color: #5865f2;
            position: relative;
            transition: box-shadow 0.2s;
        }

        /* Konuşma Efekti (Green Glow) */
        .voice-avatar.speaking {
            box-shadow: 0 0 0 2px var(--online-green);
        }

        /* Alt Kullanıcı Paneli */
        .user-panel {
            height: 52px;
            background-color: var(--bg-userpanel);
            display: flex;
            align-items: center;
            padding: 0 8px;
            justify-content: space-between;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 8px;
            width: 120px;
            overflow: hidden;
        }

        .avatar-container {
            position: relative;
        }

        .main-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background-color: #7289da;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            background-color: var(--online-green);
            border-radius: 50%;
            position: absolute;
            bottom: 0;
            right: 0;
            border: 2px solid var(--bg-userpanel);
        }

        .user-details {
            display: flex;
            flex-direction: column;
            line-height: 1.2;
        }

        .username {
            font-size: 14px;
            font-weight: bold;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .tag {
            font-size: 12px;
            color: var(--text-muted);
        }

        .user-actions {
            display: flex;
            gap: 4px;
            color: var(--text-muted);
        }

        .action-btn {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            cursor: pointer;
        }

        .action-btn:hover {
            background-color: #35373c;
            color: var(--text-main);
        }

        .action-btn.active {
            color: #f23f43;
        }

        /* Ana Sohbet Alanı */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: var(--bg-chat);
        }

        .chat-header {
            height: 48px;
            border-bottom: 1px solid #262729;
            display: flex;
            align-items: center;
            padding: 0 16px;
            font-weight: bold;
            gap: 8px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message-row {
            display: flex;
            gap: 16px;
        }

        .message-row:hover {
            background-color: #2e3035;
            margin-left: -16px;
            margin-right: -16px;
            padding-left: 16px;
            padding-right: 16px;
        }

        .msg-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: #43b581;
            flex-shrink: 0;
        }

        .msg-content-wrapper {
            display: flex;
            flex-direction: column;
        }

        .msg-header {
            display: flex;
            align-items: baseline;
            gap: 8px;
        }

        .msg-user {
            font-weight: 500;
            color: white;
            font-size: 15px;
            cursor: pointer;
        }

        .msg-user:hover { text-decoration: underline; }

        .msg-time {
            font-size: 12px;
            color: var(--text-muted);
        }

        .msg-body {
            font-size: 15px;
            color: #dbdee1;
            margin-top: 4px;
            user-select: text;
        }

        /* Mesaj Giriş Kutusu */
        .chat-input-area {
            padding: 0 16px 24px 16px;
            background-color: var(--bg-chat);
        }

        .input-wrapper {
            background-color: var(--input-bg);
            border-radius: 8px;
            display: flex;
            align-items: center;
            padding: 10px 16px;
            gap: 12px;
        }

        .input-wrapper input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-main);
            font-size: 15px;
        }

        .input-actions {
            display: flex;
            gap: 12px;
            color: var(--text-muted);
            cursor: pointer;
        }

        .input-actions i:hover {
            color: var(--text-main);
        }

        /* Sağ Üye Listesi */
        .members-sidebar {
            width: 240px;
            background-color: var(--bg-members);
            padding: 24px 8px;
            overflow-y: auto;
            flex-shrink: 0;
        }

        .member-group {
            font-size: 12px;
            font-weight: bold;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
            padding-left: 8px;
        }

        .member-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 6px 8px;
            border-radius: 4px;
            cursor: pointer;
            color: var(--text-muted);
        }

        .member-row:hover {
            background-color: #35373c;
            color: var(--text-main);
        }

        .member-name {
            font-weight: 500;
            color: #949ba4;
        }

        .member-row:hover .member-name {
            color: white;
        }

        /* Mobil Duyarlılık */
        @media (max-width: 768px) {
            .members-sidebar { display: none; }
            .channels-sidebar { width: 200px; }
        }

        @media (max-width: 480px) {
            .channels-sidebar { display: none; }
        }
    </style>
</head>
<body>

    <!-- 1. SOL SUNUCU LİSTESİ -->
    <div class="servers-sidebar">
        <div class="server-icon active" onclick="switchServer(0, this)">🏠</div>
        <div class="server-separator"></div>
        <div class="server-icon" onclick="switchServer(1, this)">🎮</div>
        <div class="server-icon" onclick="switchServer(2, this)">💻</div>
    </div>

    <!-- 2. KANAL VE KULLANICI YAN MENÜSÜ -->
    <div class="channels-sidebar">
        <div class="server-header">
            <span id="server-title">Ana Sayfa</span>
            <i data-lucide="chevron-down" style="width: 18px;"></i>
        </div>
        
        <div class="channels-list" id="channels-container">
            <!-- Dinamik Kanallar Buraya Gelecek -->
        </div>

        <!-- Alt Kullanıcı Paneli -->
        <div class="user-panel">
            <div class="user-info">
                <div class="avatar-container">
                    <div class="main-avatar" style="background-color: #e67e22;"></div>
                    <div class="status-dot"></div>
                </div>
                <div class="user-details">
                    <span class="username">Ali Rıza</span>
                    <span class="tag">#0031</span>
                </div>
            </div>
            <div class="user-actions">
                <div class="action-btn" id="mic-btn" onclick="toggleMute()">
                    <i data-lucide="mic" id="mic-icon" style="width: 18px;"></i>
                </div>
                <div class="action-btn">
                    <i data-lucide="headphones" style="width: 18px;"></i>
                </div>
                <div class="action-btn">
                    <i data-lucide="settings" style="width: 18px;"></i>
                </div>
            </div>
        </div>
    </div>

    <!-- 3. ANA SOHBET ALANI -->
    <div class="chat-area">
        <div class="chat-header">
            <i data-lucide="hash" id="header-icon" style="width: 24px; color: var(--text-muted);"></i>
            <span id="chat-title">genel</span>
        </div>
        
        <div class="chat-messages" id="chat-messages">
            <!-- Mesajlar Dinamik Olarak Yüklenecek -->
        </div>

        <div class="chat-input-area">
            <div class="input-wrapper">
                <i data-lucide="plus-circle" style="color: var(--text-muted); cursor: pointer;"></i>
                <input type="text" id="message-input" placeholder="#genel kanalına mesaj gönder" onkeypress="handleKeyPress(event)">
                <div class="input-actions">
                    <i data-lucide="gift"></i>
                    <i data-lucide="smile" onclick="addEmoji()"></i>
                </div>
            </div>
        </div>
    </div>

    <!-- 4. SAĞ ÜYE LİSTESİ -->
    <div class="members-sidebar">
        <div class="member-group">Çevrimiçi — <span id="online-count">3</span></div>
        <div id="members-container">
            <!-- Üyeler Dinamik Olarak Yüklenecek -->
        </div>
    </div>

    <script>
        // --- SAHTE VERİ MODELİ (3 Sunucu, Kanallar ve Mesajlar) ---
        const serversData = [
            {
                name: "Ana Sayfa",
                textChannels: ["genel", "duyurular", "gündem", "müzik-öneri"],
                voiceChannels: ["Ses Kanalı 1", "Sohbet Odası"],
                members: ["Ahmet", "Mehmet", "Ayşe"],
                messages: {
                    "genel": [
                        { user: "Ahmet", msg: "Selam beyler, Discord klonuna hoş geldiniz!", time: "Bugün 14:22" },
                        { user: "Ayşe", msg: "Arayüz gerçekten birebir benziyor, harika.", time: "Bugün 14:25" }
                    ],
                    "duyurular": [{ user: "Sistem", msg: "Yeni güncellemeler yakında yayında!", time: "Dün 18:00" }]
                }
            },
            {
                name: "PUBG Mobile TR",
                textChannels: ["rank-kasofası", "lobi-bul", "ekip-arama", "Turnuvalar"],
                voiceChannels: ["🎮 Squad Odam", "🏆 Turnuva Odası"],
                members: ["GodOfWar", "Vampir31", "Esma_06", "CrayzGamer"],
                messages: {
                    "rank-kasofası": [
                        { user: "GodOfWar", msg: "Fatih ligine kasan var mı şu an?", time: "Bugün 12:05" },
                        { user: "Vampir31", msg: "Geliyorum kanka odaya geç", time: "Bugün 12:06" }
                    ]
                }
            },
            {
                name: "Yazılım Geliştirme",
                textChannels: ["python", "javascript", "html-css", "bot-kodları"],
                voiceChannels: ["💻 Kod Gecesi", "☕ Kahve Molası"],
                members: ["Geliştirici_Ali", "CodeMaster", "Selin_Dev"],
                messages: {
                    "python": [
                        { user: "Geliştirici_Ali", msg: "Discord botu geliştirmek için discord.py mi yoksa pycord mu önerirsiniz?", time: "Dün 22:15" }
                    ]
                }
            }
        ];

        let activeServerIndex = 0;
        let activeChannelName = "genel";
        let activeVoiceChannelElement = null;

        // --- AGORA SES AYARLARI ---
        let rtc = {
            localAudioTrack: null,
            client: null,
        };
        // Test amaçlı genel AppID ve geçici Token (Gerçek üretimde kendi bilgilerinizi girmelisiniz)
        let options = {
            appId: "a1a89c3df31a44e59ef243389da4b65d", // Standart açık test ID'si
            channel: "DiscordCloneRoom",
            token: null, 
            uid: Math.floor(Math.random() * 10000)
        };

        let isMuted = false;

        // --- UYGULAMA BAŞLANGICI ---
        window.onload = function() {
            renderServerStructure();
            lucide.createIcons();
            initAgora();
        };

        // --- AGORA ALTYAPISI ---
        async function initAgora() {
            rtc.client = AgoraRTC.createClient({ mode: "rtc", codec: "vp8" });
            
            // Diğer kullanıcılar konuşmaya başladığında yeşil ışık yakma mantığı
            rtc.client.on("volume-indicator", volumes => {
                volumes.forEach(volume => {
                    if (volume.level > 5) {
                        setGlowEffect(volume.uid, true);
                    } else {
                        setGlowEffect(volume.uid, false);
                    }
                });
            });
        }

        // --- SUNUCU VE KANAL YÖNETİMİ ---
        function renderServerStructure() {
            const server = serversData[activeServerIndex];
            document.getElementById("server-title").innerText = server.name;

            const container = document.getElementById("channels-container");
            container.innerHTML = "";

            // Metin Kanalları Başlığı
            let textCat = document.createElement("div");
            textCat.className = "category-title";
            textCat.innerHTML = `<span>Metin Kanalları</span> <i data-lucide="plus" style="width:14px; cursor:pointer;"></i>`;
            container.appendChild(textCat);

            // Metin Kanalları Listesi
            server.textChannels.forEach((ch, idx) => {
                let div = document.createElement("div");
                div.className = `channel-item ${ch === activeChannelName ? 'active' : ''}`;
                div.innerHTML = `<i data-lucide="hash" style="width:18px;"></i> <span>${ch}</span>`;
                div.onclick = () => switchTextChannel(ch);
                container.appendChild(div);
            });

            // Ses Kanalları Başlığı
            let voiceCat = document.createElement("div");
            voiceCat.className = "category-title";
            voiceCat.innerHTML = `<span>Ses Kanalları</span> <i data-lucide="plus" style="width:14px; cursor:pointer;"></i>`;
            container.appendChild(voiceCat);

            // Ses Kanalları Listesi
            server.voiceChannels.forEach(ch => {
                let div = document.createElement("div");
                div.className = "channel-item";
                div.id = `vc-${ch.replace(/\s+/g, '')}`;
                div.innerHTML = `<i data-lucide="volume-2" style="width:18px;"></i> <span>${ch}</span>`;
                div.onclick = () => handleVoiceChannelClick(ch, div);
                
                let userSubList = document.createElement("div");
                userSubList.className = "voice-users";
                userSubList.id = `users-${div.id}`;
                
                container.appendChild(div);
                container.appendChild(userSubList);
            });

            // Üyeleri Yükle
            renderMembers();
            // Mesajları Yükle
            renderMessages();
            // İkonları Yenile
            lucide.createIcons();
        }

        function switchServer(index, element) {
            document.querySelectorAll(".server-icon"
