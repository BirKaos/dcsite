<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LunaHub</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Tam Uyumlu Renk Paleti */
        :root {
            --bg-dark-main: #111214;
            --bg-dark-secondary: #1e1f22;
            --bg-dark-tertiary: #2b2d31;
            --bg-chat: #313338;
            --accent-color: #12f3ca; /* Ekran görüntüsündeki canlı turkuaz */
            --accent-hover: #0ed6b2;
            --text-main: #dbdee1;
            --text-muted: #949ba4;
            --input-bg: #2b2d31;
            --premium-gradient: linear-gradient(135deg, #8a2be2, #12f3ca);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'GG Sans', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-dark-main);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- SPLASH SCREEN (Görsel 479) --- */
        #splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-dark-secondary);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }

        .splash-logo {
            width: 85px;
            height: 85px;
            background: var(--premium-gradient);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 38px;
            color: white;
            box-shadow: 0 8px 30px rgba(18, 243, 202, 0.25);
            margin-bottom: 24px;
        }

        .splash-title {
            font-size: 32px;
            font-weight: 700;
            color: white;
            margin-bottom: 30px;
        }

        .loading-bar-container {
            width: 220px;
            height: 4px;
            background-color: var(--bg-dark-main);
            border-radius: 2px;
            overflow: hidden;
            margin-bottom: 16px;
        }

        .loading-bar {
            width: 0%;
            height: 100%;
            background-color: var(--accent-color);
            animation: load 1.5s forwards ease-in-out;
        }

        .loading-status {
            color: var(--accent-color);
            font-size: 14px;
            font-weight: 500;
        }

        .loading-dots {
            display: flex;
            gap: 6px;
            margin-top: 24px;
        }

        .dot {
            width: 8px;
            height: 8px;
            background-color: var(--accent-color);
            border-radius: 50%;
            opacity: 0.4;
        }
        .dot:nth-child(1) { animation: pulse 0.6s infinite alternate; }
        .dot:nth-child(2) { animation: pulse 0.6s infinite alternate 0.2s; }
        .dot:nth-child(3) { animation: pulse 0.6s infinite alternate 0.4s; }

        @keyframes load { 0% { width: 0%; } 100% { width: 100%; } }
        @keyframes pulse { 0% { opacity: 0.3; transform: scale(0.8); } 100% { opacity: 1; transform: scale(1.2); } }

        /* --- AUTH CONTAINERS (Görsel 483 Birebir Stil) --- */
        .auth-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-dark-main);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
            z-index: 999;
            overflow-y: auto;
        }

        .brand-header {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 28px;
            font-weight: 700;
            color: white;
            margin-bottom: 8px;
        }

        .brand-header i {
            color: var(--accent-color);
        }

        .brand-subtitle {
            color: var(--text-muted);
            font-size: 15px;
            margin-bottom: 24px;
        }

        .auth-card {
            background-color: var(--bg-dark-secondary);
            padding: 28px;
            border-radius: 12px;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        }

        .auth-card h2 {
            font-size: 22px;
            font-weight: 700;
            color: white;
            margin-bottom: 6px;
        }

        .auth-card .card-desc {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-size: 11px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .form-group input {
            width: 100%;
            background-color: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255,255,255,0.05);
            padding: 12px 14px;
            border-radius: 8px;
            color: white;
            font-size: 15px;
            outline: none;
        }

        .form-group input:focus {
            border-color: var(--accent-color);
        }

        .password-toggle {
            position: absolute;
            right: 14px;
            color: var(--text-muted);
            cursor: pointer;
        }

        /* reCAPTCHA Kutusu */
        .captcha-box {
            background-color: #222428;
            border: 1px solid #333;
            border-radius: 4px;
            padding: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .captcha-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .captcha-checkbox {
            width: 24px;
            height: 24px;
            border: 2px solid #555;
            border-radius: 2px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .captcha-checkbox.checked {
            background-color: #009688;
            border-color: #009688;
            color: white;
        }

        .captcha-text {
            font-size: 13px;
            color: #fff;
        }

        .captcha-right {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .captcha-right i {
            color: #1a73e8;
            font-size: 18px;
        }

        .captcha-right span {
            font-size: 8px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .auth-btn {
            width: 100%;
            background-color: var(--accent-color);
            color: #111214;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .auth-btn:hover {
            background-color: var(--accent-hover);
        }

        .auth-footer-links {
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
        }

        .auth-link {
            color: var(--accent-color);
            text-decoration: none;
            cursor: pointer;
        }

        .auth-link:hover {
            text-decoration: underline;
        }

        /* --- ANA UYGULAMA DUZENI (Görsel 481) --- */
        #app-container {
            display: none;
            flex: 1;
            height: calc(100vh - 60px);
        }

        .page {
            display: none;
            flex: 1;
            height: 100%;
        }

        .page.active {
            display: flex;
        }

        .servers-layout {
            display: flex;
            width: 100%;
            height: 100%;
        }

        /* Sol Bar */
        .servers-sidebar {
            width: 72px;
            background-color: var(--bg-dark-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 12px;
            gap: 8px;
        }

        .server-icon {
            width: 48px;
            height: 48px;
            background-color: var(--bg-dark-tertiary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: bold;
            font-size: 18px;
        }

        .server-icon.active {
            border-radius: 14px;
            background-color: var(--accent-color);
            color: #111214;
        }

        /* Kanallar Side barı */
        .channels-sidebar {
            width: 240px;
            background-color: var(--bg-dark-secondary);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .server-title-bar {
            height: 48px;
            padding: 0 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-weight: 700;
            border-bottom: 1px solid rgba(0,0,0,0.2);
            font-size: 15px;
        }

        .channels-content {
            flex: 1;
            padding: 14px 8px;
            overflow-y: auto;
        }

        .category-title {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            margin: 12px 0 6px 6px;
            letter-spacing: 0.5px;
        }

        .channel-item {
            display: flex;
            align-items: center;
            padding: 10px 12px;
            border-radius: 6px;
            color: var(--text-muted);
            cursor: pointer;
            margin-bottom: 4px;
            gap: 10px;
            font-size: 15px;
        }

        .channel-item.active {
            background-color: rgba(255,255,255,0.06);
            color: white;
            font-weight: 600;
        }

        /* Alt Profil Bölümü (Görsel 481 Birebir) */
        .user-profile-footer {
            height: 52px;
            background-color: rgba(0,0,0,0.15);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 10px;
        }

        .profile-info {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .profile-avatar-wrapper {
            position: relative;
        }

        .profile-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background-color: var(--accent-color);
            color: #111214;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 14px;
        }

        .profile-status {
            width: 10px;
            height: 10px;
            background-color: #23a55a;
            border: 2px solid var(--bg-dark-secondary);
            border-radius: 50%;
            position: absolute;
            bottom: -1px;
            right: -1px;
        }

        .profile-texts {
            display: flex;
            flex-direction: column;
        }

        .profile-name {
            font-size: 13px;
            font-weight: 600;
            color: white;
            line-height: 14px;
        }

        .profile-tag-sub {
            font-size: 11px;
            color: var(--text-muted);
        }

        .profile-actions {
            display: flex;
            gap: 12px;
            color: var(--text-muted);
        }

        .profile-actions i {
            cursor: pointer;
            width: 18px;
            height: 18px;
        }

        .profile-actions i:hover { color: white; }

        /* Sohbet Alanı */
        .chat-area {
            flex: 1;
            background-color: var(--bg-chat);
            display: flex;
            flex-direction: column;
        }

        .chat-header {
            height: 48px;
            padding: 0 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 700;
            border-bottom: 1px solid rgba(0,0,0,0.2);
        }

        .chat-messages {
            flex: 1;
            padding: 16px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message-row { display: flex; gap: 12px; }

        .msg-username { font-weight: 600; color: white; }

        .premium-tag {
            background: var(--premium-gradient);
            color: white;
            font-size: 10px;
            padding: 1px 5px;
            border-radius: 4px;
            font-weight: 700;
        }

        .msg-time { font-size: 11px; color: var(--text-muted); margin-left: 6px; }

        .msg-text { margin-top: 4px; color: #dbdee1; }

        .chat-input-container { padding: 0 16px 16px 16px; }

        .chat-input-wrapper {
            background-color: var(--input-bg);
            border-radius: 8px;
            display: flex;
            align-items: center;
            padding: 12px;
            gap: 12px;
        }

        .chat-input-wrapper input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: white;
            font-size: 15px;
        }

        /* --- AYARLAR SAYFASI (Görsel 480) --- */
        .settings-page {
            background-color: var(--bg-dark-secondary);
            flex-direction: column;
            width: 100%;
            overflow-y: auto;
        }

        .settings-header {
            height: 56px;
            padding: 0 16px;
            display: flex;
            align-items: center;
            gap: 16px;
            font-weight: 700;
            font-size: 18px;
            border-bottom: 1px solid rgba(0,0,0,0.2);
        }

        .settings-section-title {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            padding: 18px 16px 6px 16px;
            letter-spacing: 0.5px;
        }

        .settings-item {
            display: flex;
            align-items: center;
            padding: 14px 16px;
            gap: 16px;
            cursor: pointer;
            color: #dbdee1;
        }

        .settings-item i { color: var(--text-muted); width: 20px; height: 20px; }

        .settings-item-text { font-size: 15px; flex: 1; }

        .premium-box {
            margin: 16px;
            background: var(--premium-gradient);
            border-radius: 12px;
            padding: 16px;
            color: white;
        }

        .premium-box h3 { font-size: 18px; margin-bottom: 6px; display: flex; align-items: center; gap: 8px; }

        .premium-box p { font-size: 13px; opacity: 0.9; margin-bottom: 12px; }

        .premium-btn {
            background-color: white;
            color: #8a2be2;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 700;
            cursor: pointer;
        }

        /* --- SABİT ALT GEZİNTİ BARBARI --- */
        .bottom-navigation {
            display: none;
            height: 60px;
            background-color: var(--bg-dark-main);
            border-top: 1px solid rgba(255,255,255,0.05);
            justify-content: space-around;
            align-items: center;
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 11px;
            gap: 4px;
            flex: 1;
            padding: 8px 0;
        }

        .nav-item.active { color: var(--accent-color); }

        @media(max-width: 768px) {
            .channels-sidebar { display: none; }
            .channels-sidebar.active-nav { display: flex; width: 100%; }
        }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div class="splash-logo">🌙</div>
        <div class="splash-title">LunaHub</div>
        <div class="loading-bar-container">
            <div class="loading-bar"></div>
        </div>
        <div class="loading-status">Hazır!</div>
        <div class="loading-dots">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
    </div>

    <div id="login-screen" class="auth-container">
        <div class="brand-header">
            <i data-lucide="sparkles"></i> LunaHub
        </div>
        <div class="brand-subtitle">Tekrar hoş geldin!</div>

        <div class="auth-card">
            <h2>Giriş yap</h2>
            <div class="card-desc">Hesabına giriş yap ve sohbete katıl</div>
            
            <div class="form-group">
                <label>Kullanıcı Adı</label>
                <input type="text" id="login-username" placeholder="Kullanıcı adınızı yazın...">
            </div>
            
            <div class="form-group">
                <label>Şifre</label>
                <div class="input-wrapper">
                    <input type="password" id="login-password" placeholder="••••••••">
                    <i data-lucide="eye" class="password-toggle" id="toggle-login-pass" onclick="togglePassVisibility('login-password', 'toggle-login-pass')"></i>
                </div>
            </div>

            <div class="captcha-box">
                <div class="captcha-left">
                    <div class="captcha-checkbox" id="captcha-check" onclick="handleCaptchaClick()"></div>
                    <div class="captcha-text">Ben robot değilim</div>
                </div>
                <div class="captcha-right">
                    <i data-lucide="refresh-cw"></i>
                    <span>reCAPTCHA</span>
                </div>
            </div>

            <button class="auth-btn" onclick="handleLogin()">
                <i data-lucide="log-in" style="width: 18px;"></i> Giriş Yap
            </button>
            
            <div class="auth-footer-links">
                <span style="color: var(--text-muted)">Hesabın yok mu?</span> 
                <span class="auth-link" onclick="toggleAuthScreens('register')">Hesap oluştur</span>
                <br><br>
                <span class="auth-link" style="color: var(--text-muted); font-size: 12px;">Şifremi Unuttum</span>
            </div>
        </div>
    </div>

    <div id="register-screen" class="auth-container">
        <div class="brand-header"><i data-lucide="sparkles"></i> LunaHub</div>
        <div class="brand-subtitle">Aramıza katıl!</div>
        <div class="auth-card">
            <h2>Hesap oluştur</h2>
            <div class="card-desc">Yeni bir LunaHub hesabı açın<
