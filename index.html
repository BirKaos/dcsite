<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LunaHub - Giriş</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #12141c; color: #fff; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .auth-container { background-color: #1c1e28; width: 100%; max-width: 420px; padding: 40px 30px; border-radius: 12px; border: 1px solid #282a36; text-align: center; }
        .logo { font-size: 32px; font-weight: bold; color: #fff; display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 5px; }
        .logo span { color: #00e5bc; }
        .subtitle { color: #9aa0a6; font-size: 14px; margin-bottom: 30px; }
        .form-title { font-size: 24px; font-weight: bold; text-align: left; margin-bottom: 5px; }
        .form-subtitle { text-align: left; color: #65697b; font-size: 13px; margin-bottom: 20px; }
        .form-group { text-align: left; margin-bottom: 20px; }
        .form-group label { display: block; font-size: 11px; color: #9aa0a6; font-weight: bold; text-transform: uppercase; margin-bottom: 8px; }
        .form-group input { width: 100%; background-color: #252836; border: 1px solid #2f3345; padding: 14px; border-radius: 8px; color: white; font-size: 15px; outline: none; transition: border 0.2s; }
        .form-group input:focus { border-color: #00e5bc; }
        .captcha-container { background-color: #12141c; border: 1px solid #252836; border-radius: 8px; padding: 15px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; cursor: pointer; user-select: none; }
        .captcha-left { display: flex; align-items: center; gap: 12px; }
        .captcha-checkbox { width: 22px; height: 22px; border: 2px solid #555; border-radius: 4px; display: flex; align-items: center; justify-content: center; transition: all 0.2s; background: transparent; }
        .captcha-checkbox::after { content: "✓"; color: #12141c; font-weight: bold; font-size: 14px; display: none; }
        .captcha-container.checked .captcha-checkbox { background-color: #00e5bc; border-color: #00e5bc; }
        .captcha-container.checked .captcha-checkbox::after { display: block; }
        .captcha-text { font-size: 14px; color: #d1d2d6; }
        .captcha-right { display: flex; flex-direction: column; align-items: center; font-size: 8px; color: #65697b; }
        .captcha-right img { width: 26px; margin-bottom: 2px; }
        .submit-btn { width: 100%; background-color: #00e5bc; color: #12141c; border: none; padding: 14px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: opacity 0.2s; display: flex; justify-content: center; align-items: center; gap: 8px; }
        .toggle-container { margin-top: 20px; font-size: 14px; color: #9aa0a6; }
        .toggle-link { color: #00e5bc; cursor: pointer; font-weight: 600; text-decoration: underline; background: none; border: none; font-size: 14px; }
    </style>
</head>
<body>

    <div class="auth-container" id="auth-box">
        <div class="logo">🌙 Luna<span>Hub</span></div>
        <div class="subtitle" id="auth-subtitle">Tekrar hoş geldin!</div>
        
        <form id="auth-form">
            <div class="form-title" id="form-title">Giriş yap</div>
            <div class="form-subtitle" id="form-desc">Hesabına giriş yap ve sohbete katıl</div>
            
            <div class="form-group">
                <label id="user-label">E-Posta Adresi veya Kullanıcı Adı</label>
                <input type="text" id="username" placeholder="ornek@email.com veya kullanıcı adı" required>
            </div>
            
            <div class="form-group">
                <label>Şifre</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            
            <div class="captcha-container" id="captcha-btn">
                <div class="captcha-left">
                    <div class="captcha-checkbox"></div>
                    <div class="captcha-text">Ben robot değilim</div>
                </div>
                <div class="captcha-right">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/a/ad/RecaptchaLogo.svg" alt="recaptcha">
                    <span>reCAPTCHA</span>
                </div>
            </div>
            
            <button type="submit" class="submit-btn" id="submit-btn">→ Giriş Yap</button>
        </form>
        
        <div class="toggle-container" id="toggle-container">
            Hesabın yok mu? <button class="toggle-link" id="switch-auth">Hesap oluştur</button>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
